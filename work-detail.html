  <style>
    /* 全局灯箱样式 */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img {
      max-width: 90%;
      max-height: 90vh;
      object-fit: contain;
    }
    /* 左右切换按钮 */
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      font-size: 30px;
      color: #fff;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      cursor: pointer;
      user-select: none;
    }
    .lightbox-prev { left: 30px; }
    .lightbox-next { right: 30px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 36px;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
    .tb-main img,
    .tb-thumb img {
      cursor: zoom-in;
    }
  </style>
</head>

  <!-- 交互JS -->
<script>
// 1. 所有图片列表【按你当前产品顺序】
const imgList = [
  "images/dd-yashua/DDYS-1.jpg",
  "images/dd-yashua/DDYS-2.jpg",
  "images/dd-yashua/DDYS-3.jpg",
  "images/dd-yashua/DDYS-4.jpg",
  "images/dd-yashua/DDYS-5.jpg",
  "images/dd-yashua/DDYS-6.jpg",
  "images/dd-yashua/DDYS-7.jpg"
];
let currentIndex = 0;

// 2. 切换主图
function switchImg(el){
  document.getElementById('tbMainImg').src = el.src;
  document.querySelectorAll('.tb-thumb img').forEach(item=>{
    item.classList.remove('active');
  })
  el.classList.add('active');
  // 记录当前索引
  currentIndex = imgList.indexOf(el.src);
}

// 3. 打开灯箱（通过图片地址）
function openLightboxByUrl(url){
  currentIndex = imgList.indexOf(url);
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}

// 4. 上一张
function prevImg(){
  currentIndex--;
  if(currentIndex < 0) currentIndex = imgList.length - 1;
  document.getElementById('lightboxImg').src = imgList[currentIndex];
}

// 5. 下一张
function nextImg(){
  currentIndex++;
  if(currentIndex >= imgList.length) currentIndex = 0;
  document.getElementById('lightboxImg').src = imgList[currentIndex];
}

// 6. 关闭灯箱
function closeLightbox(){
  document.getElementById('lightbox').style.display = 'none';
}

// 键盘左右键翻图 / ESC关闭
document.addEventListener('keydown',function(e){
  if(e.key === 'ArrowLeft') prevImg();
  if(e.key === 'ArrowRight') nextImg();
  if(e.key === 'Escape') closeLightbox();
});

// 汉堡菜单
const hamburger = document.querySelector('.hamburger');
const navMenu = document.querySelector('.nav-menu');
hamburger.addEventListener('click', () => {
  navMenu.classList.toggle('active');
  hamburger.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
});
document.querySelectorAll('.nav-menu a').forEach(link => {
  link.addEventListener('click', () => {
    navMenu.classList.remove('active');
    hamburger.textContent = '☰';
  });
});
</script>
