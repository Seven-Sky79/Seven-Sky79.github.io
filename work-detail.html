<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品详情 | 袁鹏</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 灯箱放大样式（保留不变） */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img {
      max-width: 90%;
      max-height: 90vh;
      object-fit: contain;
    }
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      font-size: 30px;
      color: #fff;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      cursor: pointer;
      user-select: none;
    }
    .lightbox-prev { left: 30px; }
    .lightbox-next { right: 30px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 36px;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
    .tb-main img,
    .tb-thumb img {
      cursor: zoom-in;
    }
  </style>
</head>
<body>
<!-- 导航栏（全站统一） -->
<nav class="navbar">
  <div class="container nav-wrap">
    <a href="index.html" class="logo">YUAN PENG · DESIGN</a>
    <ul class="nav-menu">
      <li><a href="index.html">首页</a></li>
      <li><a href="portfolio.html" class="active">作品集</a></li>
      <li><a href="about.html">关于我</a></li>
      <li><a href="contact.html">联系我</a></li>
    </ul>
    <button class="hamburger">☰</button>
  </div>
</nav>

<section class="work-detail-section">
  <div class="container">
    <div class="work-detail-header">
      <!-- 产品标题（JS自动填充） -->
      <h1 id="workTitle">产品设计案例</h1>
      <p class="work-tag-detail">三维渲染 / 电商视觉</p>
    </div>

    <!-- 淘宝式图片画廊（自动加载当前产品的图片） -->
    <div class="tb-gallery">
      <div class="tb-main">
        <img id="tbMainImg" src="" alt="主图" onclick="openLightboxByUrl(this.src)">
      </div>
      <div class="tb-thumb" id="thumbList">
        <!-- 缩略图由JS自动生成，不用手动写 -->
      </div>
    </div>

    <div class="work-detail-content">
      <h2>项目介绍</h2>
      <!-- 产品介绍（JS自动填充） -->
      <p id="workDesc">产品三维建模、材质渲染、场景合成，全套电商视觉落地，适配跨境平台展示规范。</p>
    </div>

    <div class="back-link">
      <a href="portfolio.html" class="btn btn-outline">← 返回作品集</a>
    </div>
  </div>
</section>

<!-- 全屏放大灯箱 + 左右翻页（保留不变） -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-close" onclick="closeLightbox()">×</div>
  <div class="lightbox-prev" onclick="prevImg()">←</div>
  <img class="lightbox-img" id="lightboxImg" src="">
  <div class="lightbox-next" onclick="nextImg()">→</div>
</div>

<!-- 页脚（全站统一） -->
<footer class="footer">
  <div class="container">
    <p>© 2026 YUAN PENG · 电商设计师</p>
  </div>
</footer>

<script>
// ====================== 1. 在这里配置所有21个产品信息 ======================
// key是产品文件夹名（必须和images下的文件夹名完全一致）
// value是产品标题和介绍，不用每个页面改，统一在这里管理
const products = {
  // 示例1：电动牙刷
  'dd-yashua': {
    title: '电动牙刷',
  },  
  // 示例2：彩灯
  'Caideng': {
    title: '彩灯',
  },
  // 示例3：手表
  'watch': {
    title: '手表',
  },
  // 示例4：捏捏球
  'nienieqiu': {
    title: '捏捏球',
  },
  // 示例5：巴克球
  'bakeqqiu': {
    title: '巴克球',
  },
  // 示例6：涂鸦板
  'tuyaban': {
    title: '涂鸦板',
  },
  // 示例7：充电器
  'chongdianqiXR': {
    title: '充电器-渲染',
  },
  // 示例4：净化器
  'kq-jinghuaqi': {
    title: '空气净化器',
  },
  // 示例4：指甲钳
  'zhijaiqia': {
    title: '指甲钳',
  },
  // 示例4：美妆蛋
  'meizhuangdan': {
    title: '美妆蛋',
  },
  // 示例4：婴儿吸鼻器
  'yingerxibiqi': {
    title: '婴儿吸鼻器',
  },
  // 示例4：跳绳
  'tiaoshen': {
    title: '跳绳',
  },
  // 示例4：空气炸锅
  'kq-zhaguo': {
    title: '空气炸锅',
  },
  // 示例4：三线切割器
  'qiegeqi': {
    title: '三线切割器',
  },
  // 示例4：研磨器
  'yanmoqi': {
    title: '研磨器',
  },
  // 示例4：搬家滑轮
  'Banjiahualun': {
    title: '搬家滑轮',
  },
  // 示例4：随身听
  'suishenting': {
    title: '随身听',
  },
  // 示例4：马桶刷
  'matongshua': {
    title: '马桶刷',
  },
  // 示例4：MP3
  'MP3': {
    title: 'MP3',
  },
  // 示例4：草坪灯
  'Caopingdeng': {
    title: '草坪灯',
  },
  // 示例21：花洒
  'huasa': {
    title: '花洒',
  },
  // 【把剩下18个产品按上面的格式补充进来即可】
  // 格式：'文件夹名': { title: '产品标题', desc: '产品介绍' },
};

// ====================== 2. 自动解析链接参数，加载对应产品 ======================
// 获取URL中的产品文件夹名，比如work-detail.html?product=chongdianqiXR
const urlParams = new URLSearchParams(window.location.search);
const productFolder = urlParams.get('product');

// 如果没传参数，默认加载第一个产品
if (!productFolder || !products[productFolder]) {
  alert('未找到对应产品，将加载默认产品');
  window.location.href = 'work-detail.html?product=chongdianqiXR';
}

// 自动生成当前产品的图片列表（不用手动写imgList）
const imgList = [];
for (let i = 1; i <= 7; i++) {
  imgList.push(`images/${productFolder}/HL-${i}.jpg`);
}
let currentIndex = 0;

// ====================== 3. 页面初始化：设置标题、介绍、图片 ======================
document.getElementById('workTitle').textContent = products[productFolder].title;
document.getElementById('workDesc').textContent = products[productFolder].desc;
document.getElementById('tbMainImg').src = imgList[0];

// 自动生成缩略图（不用手动写7个img标签）
const thumbList = document.getElementById('thumbList');
thumbList.innerHTML = ''; // 清空默认内容
imgList.forEach((src, index) => {
  const img = document.createElement('img');
  img.src = src;
  img.onclick = () => switchImg(img);
  if (index === 0) img.classList.add('active');
  thumbList.appendChild(img);
});

// ====================== 4. 原有功能（图片切换、灯箱放大、翻页） ======================
// 切换主图
function switchImg(el){
  document.getElementById('tbMainImg').src = el.src;
  document.querySelectorAll('.tb-thumb img').forEach(item=>{
    item.classList.remove('active');
  })
  el.classList.add('active');
  // 更新当前索引
  currentIndex = imgList.indexOf(el.src);
}

// 打开灯箱
function openLightboxByUrl(url){
  currentIndex = imgList.indexOf(url);
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}

// 上一张/下一张
function prevImg(){
  currentIndex--;
  if(currentIndex < 0) currentIndex = imgList.length - 1;
  document.getElementById('lightboxImg').src = imgList[currentIndex];
}
function nextImg(){
  currentIndex++;
  if(currentIndex >= imgList.length) currentIndex = 0;
  document.getElementById('lightboxImg').src = imgList[currentIndex];
}

// 关闭灯箱
function closeLightbox(){
  document.getElementById('lightbox').style.display = 'none';
}

// 键盘控制（← →翻图，ESC关闭）
document.addEventListener('keydown',function(e){
  if(e.key === 'ArrowLeft') prevImg();
  if(e.key === 'ArrowRight') nextImg();
  if(e.key === 'Escape') closeLightbox();
});

// 汉堡菜单
const hamburger = document.querySelector('.hamburger');
const navMenu = document.querySelector('.nav-menu');
hamburger.addEventListener('click', () => {
  navMenu.classList.toggle('active');
  hamburger.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
});
document.querySelectorAll('.nav-menu a').forEach(link => {
  link.addEventListener('click', () => {
    navMenu.classList.remove('active');
    hamburger.textContent = '☰';
  });
});
</script>
</body>
</html>
