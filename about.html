<body>
<!-- 导航栏 -->

<!-- 关于我内容 -->
<section class="about-section">
  <div class="container">
    <div class="about-content">
      <div class="about-text">
        <h1>关于我</h1>
        <p>资深视觉设计师，拥有丰富的品牌与数字媒体设计经验，专注极简高级感设计与AIGC创意创作，擅长将商业需求与艺术表达结合。</p>
        
        <h2>设计理念</h2>
        <p>少即是多，用留白与细节传递高级质感，让设计回归本质。拒绝过度装饰，让每一个元素都服务于品牌与用户体验。</p>
        
        <h2>技能领域</h2>
        <div class="skills-list">
          <span class="skill-tag">品牌设计</span>
          <span class="skill-tag">视觉传达</span>
          <span class="skill-tag">电商美工</span>
          <span class="skill-tag">三维渲染</span>
          <span class="skill-tag">AIGC创意</span>
        </div>
      </div>
      <div class="about-image">
        <img src="images/about.jpg" alt="袁鹏的工作照" class="about-img">
      </div>
    </div>

</section>

<!-- 汉堡菜单JS -->
<script>
const hamburger = document.querySelector('.hamburger');
const navMenu = document.querySelector('.nav-menu');

hamburger.addEventListener('click', () => {
  navMenu.classList.toggle('active');
  hamburger.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
});

document.querySelectorAll('.nav-menu a').forEach(link => {
  link.addEventListener('click', () => {
    navMenu.classList.remove('active');
    hamburger.textContent = '☰';
  });
});
</script>
</body>
